name: Build Documentation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v5
     
      -  name: Build Docs
         run: make -C Documentation


      - name: Upload PTLsimManual
        uses: actions/upload-artifact@v7
        with:
          name: PTLsimManual.pdf
          path: Documentation/PTLsimManual.pdf

    
